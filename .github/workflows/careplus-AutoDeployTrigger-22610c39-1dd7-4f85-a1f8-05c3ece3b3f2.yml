name: Trigger auto deployment for careplus

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/careplus-AutoDeployTrigger-22610c39-1dd7-4f85-a1f8-05c3ece3b3f2.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CAREPLUS_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CAREPLUS_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CAREPLUS_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/backend
          dockerfilePath: Dockerfile
          registryUrl: 1440isme.azurecr.io
          registryUsername: ${{ secrets.CAREPLUS_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CAREPLUS_REGISTRY_PASSWORD }}
          containerAppName: careplus
          resourceGroup: rg-enflow
          imageToBuild: 1440isme.azurecr.io/careplus:${{ github.sha }}
